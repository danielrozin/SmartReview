name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      deployment_url:
        description: "Vercel deployment URL to rollback to (from a previous deploy)"
        required: true
      reason:
        description: "Reason for rollback"
        required: true

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Promote Previous Deployment
        run: |
          echo "Rolling back to: ${{ github.event.inputs.deployment_url }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          vercel promote ${{ github.event.inputs.deployment_url }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Verify Rollback
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ github.event.inputs.deployment_url }}")
          if [ "$STATUS" -ne 200 ]; then
            echo "Rollback verification FAILED! Status: $STATUS"
            exit 1
          fi
          echo "Rollback verified (HTTP $STATUS)"

      - name: Summary
        run: |
          echo "## Rollback Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Rolled back to:** ${{ github.event.inputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Reason:** ${{ github.event.inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
