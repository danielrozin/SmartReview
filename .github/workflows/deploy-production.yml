name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: false
        default: "main"
      skip_approval:
        description: "Skip manual approval (emergency deploys only)"
        required: false
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  ci-check:
    name: Pre-deploy CI Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test

  approve:
    name: Production Approval Gate
    needs: [ci-check]
    if: ${{ github.event.inputs.skip_approval != 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Approval confirmed
        run: echo "Production deployment approved"

  deploy:
    name: Deploy to Production
    needs: [ci-check, approve]
    if: ${{ !cancelled() && needs.ci-check.result == 'success' && (needs.approve.result == 'success' || needs.approve.result == 'skipped') }}
    runs-on: ubuntu-latest
    outputs:
      deployment_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Production deployed to: $URL"

      - name: Post-deploy Smoke Test
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}")
          if [ "$STATUS" -ne 200 ]; then
            echo "Production smoke test FAILED! Status: $STATUS"
            echo "Consider running the rollback workflow."
            exit 1
          fi
          echo "Production smoke test passed (HTTP $STATUS)"

  notify:
    name: Deployment Summary
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Ref:** ${{ github.event.inputs.ref || 'main' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ needs.deploy.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
